<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Section - A24 Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            color: #000;
            min-height: 100vh;
            padding: 2rem;
        }

        .merch-section {
            max-width: 1400px;
            margin: 0 auto;
        }

        .merch-header {
            border-top: 2px solid #000;
            padding-top: 1rem;
            margin-bottom: 3rem;
        }

        .merch-header h2 {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .merch-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .merch-item {
            cursor: pointer;
        }

        .merch-item-image {
            aspect-ratio: 1;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .merch-item-image img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .merch-item:hover .merch-item-image img {
            transform: scale(1.05);
        }

        .merch-item-tag {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 0.25rem;
        }

        .merch-item-name {
            font-size: 0.9375rem;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 0.25rem;
        }

        .merch-item-price {
            font-size: 0.9375rem;
            color: #000;
        }

        .merch-item-variants {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .variant-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid #ddd;
        }

        /* Carousel arrow */
        .merch-carousel {
            position: relative;
        }

        .carousel-arrow {
            position: absolute;
            right: -1rem;
            top: 35%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            color: #000;
        }

        @media (max-width: 1024px) {
            .merch-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .merch-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .merch-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <section class="merch-section">
        <div class="merch-header">
            <h2>Our Hero, Balthazar</h2>
        </div>

        <div class="merch-carousel">
            <div class="merch-grid">
                <div class="merch-item" onclick="goToProduct()">
                    <div class="merch-item-image">
                        <div id="shopify-img-1" style="color:#999;font-size:12px;">Loading...</div>
                    </div>
                    <p class="merch-item-tag">Now Available</p>
                    <p class="merch-item-name">Our Hero, Balthazar Official Movie T Shirt</p>
                    <p class="merch-item-price">$25</p>
                </div>

                <div class="merch-item" style="opacity: 0.4; pointer-events: none;">
                    <div class="merch-item-image">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </div>
                    <p class="merch-item-tag">Coming Soon</p>
                    <p class="merch-item-name">Poster</p>
                    <p class="merch-item-price">TBA</p>
                </div>

                <div class="merch-item" style="opacity: 0.4; pointer-events: none;">
                    <div class="merch-item-image">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </div>
                    <p class="merch-item-tag">Coming Soon</p>
                    <p class="merch-item-name">Hat</p>
                    <p class="merch-item-price">TBA</p>
                </div>

                <div class="merch-item" style="opacity: 0.4; pointer-events: none;">
                    <div class="merch-item-image">
                        <svg width="60" height="60" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1">
                            <rect x="3" y="3" width="18" height="18" rx="2"/>
                            <circle cx="8.5" cy="8.5" r="1.5"/>
                            <path d="M21 15l-5-5L5 21"/>
                        </svg>
                    </div>
                    <p class="merch-item-tag">Coming Soon</p>
                    <p class="merch-item-name">Tote Bag</p>
                    <p class="merch-item-price">TBA</p>
                </div>
            </div>

            <div class="carousel-arrow">›</div>
        </div>
    </section>

    <script type="text/javascript">
    var scriptURL = 'https://sdks.shopifycdn.com/buy-button/latest/buy-button-storefront.min.js';
    var client;
    var productData;

    function loadScript() {
        var script = document.createElement('script');
        script.async = true;
        script.src = scriptURL;
        script.onload = initShopify;
        document.head.appendChild(script);
    }

    function initShopify() {
        client = ShopifyBuy.buildClient({
            domain: 'e2q7dk-hc.myshopify.com',
            storefrontAccessToken: 'd41616f300a21e34f4edd68d8f23b4e8',
        });

        ShopifyBuy.UI.onReady(client).then(function (ui) {
            client.product.fetchAll().then(function(products) {
                if (products.length > 0) {
                    productData = products.find(p => p.title.toLowerCase().includes('shirt')) || products[0];

                    var imgUrl = productData.images && productData.images[0] ? productData.images[0].src : '';
                    var imgEl = document.getElementById('shopify-img-1');
                    if (imgUrl && imgEl) {
                        imgEl.innerHTML = '<img src="' + imgUrl + '" alt="' + productData.title + '">';
                    }
                }
            });
        });
    }

    function goToProduct() {
        if (!productData || !client) {
            alert('Loading...');
            return;
        }

        // Go directly to checkout with first variant
        client.checkout.create().then(function(checkout) {
            client.checkout.addLineItems(checkout.id, [{
                variantId: productData.variants[0].id,
                quantity: 1
            }]).then(function(checkout) {
                window.location.href = checkout.webUrl;
            });
        });
    }

    if (window.ShopifyBuy) {
        initShopify();
    } else {
        loadScript();
    }
    </script>
</body>
</html>
