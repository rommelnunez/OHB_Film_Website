<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Merch Section - A24 Style</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Inter', sans-serif;
            background: #f5f5f5;
            color: #000;
            min-height: 100vh;
            padding: 2rem;
        }

        .merch-section {
            max-width: 1400px;
            margin: 0 auto;
        }

        .merch-header {
            border-top: 2px solid #000;
            padding-top: 1rem;
            margin-bottom: 3rem;
        }

        .merch-header h2 {
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .merch-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 2rem;
        }

        .merch-item {
            cursor: pointer;
        }

        .merch-item-image {
            aspect-ratio: 1;
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-bottom: 1rem;
            overflow: hidden;
        }

        .merch-item-image img {
            max-width: 85%;
            max-height: 85%;
            object-fit: contain;
            transition: transform 0.3s ease;
        }

        .merch-item:hover .merch-item-image img {
            transform: scale(1.05);
        }

        .merch-item-tag {
            font-size: 0.625rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #666;
            margin-bottom: 0.25rem;
        }

        .merch-item-name {
            font-size: 0.9375rem;
            font-weight: 500;
            line-height: 1.3;
            margin-bottom: 0.25rem;
        }

        .merch-item-price {
            font-size: 0.9375rem;
            color: #000;
        }

        .merch-item-variants {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.5rem;
        }

        .variant-dot {
            width: 16px;
            height: 16px;
            border-radius: 50%;
            border: 1px solid #ddd;
        }

        /* Carousel arrow */
        .merch-carousel {
            position: relative;
        }

        .carousel-arrow {
            position: absolute;
            right: -1rem;
            top: 35%;
            transform: translateY(-50%);
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.5rem;
            color: #000;
        }

        @media (max-width: 1024px) {
            .merch-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .merch-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 480px) {
            .merch-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
