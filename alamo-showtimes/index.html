<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Alamo Drafthouse Showtimes Finder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 0 auto;
        }
        header {
            text-align: center;
            margin-bottom: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }
        header img {
            height: 50px;
        }
        h1 {
            color: #dc2626;
            font-size: 1.8rem;
        }
        .search-section {
            background: #2d2d44;
            padding: 20px;
            border-radius: 12px;
            margin-bottom: 20px;
        }
        .form-group {
            margin-bottom: 15px;
        }
        label {
            display: block;
            margin-bottom: 5px;
            color: #aaa;
            font-size: 0.9rem;
        }
        input, select {
            width: 100%;
            padding: 12px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #1a1a2e;
            color: #eee;
            font-size: 1rem;
        }
        input:focus, select:focus {
            outline: none;
            border-color: #dc2626;
        }
        button {
            background: #dc2626;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
        }
        button:hover {
            background: #b91c1c;
        }
        button:disabled {
            background: #666;
            cursor: not-allowed;
        }
        .download-btn {
            background: #059669;
            margin-top: 5px;
        }
        .download-btn:hover {
            background: #047857;
        }
        .download-btn:disabled {
            background: #666;
        }
        .results {
            margin-top: 20px;
        }
        .result-card {
            background: #2d2d44;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 10px;
            border-left: 4px solid #dc2626;
        }
        .result-card.sold-out {
            opacity: 0.6;
            border-left-color: #666;
        }
        .theater-name {
            font-weight: 600;
            color: #dc2626;
            margin-bottom: 5px;
        }
        .showtime-info {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            margin-bottom: 8px;
        }
        .date, .time {
            color: #fff;
            font-weight: 500;
        }
        .event-type {
            color: #aaa;
            font-size: 0.9rem;
        }
        .ticket-link {
            display: inline-block;
            background: #dc2626;
            color: white;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 0.9rem;
            margin-top: 8px;
        }
        .ticket-link:hover {
            background: #b91c1c;
        }
        .ticket-link.sold-out {
            background: #666;
            pointer-events: none;
        }
        .status {
            text-align: center;
            padding: 20px;
            color: #aaa;
        }
        .error {
            color: #f87171;
            background: #3d2020;
            padding: 15px;
            border-radius: 8px;
        }
        .seats-left {
            color: #10b981;
            font-size: 0.85rem;
            margin-left: 10px;
        }
        .seats-left.low {
            color: #f59e0b;
        }
        .seats-left.critical {
            color: #ef4444;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <img src="https://drafthouse.com/s/assets/img/ADC_Logo_White.svg" alt="Alamo Drafthouse">
            <h1>Showtimes Finder</h1>
        </header>

        <div class="search-section">
            <div class="form-group">
                <label for="filmSlug">Film Slug</label>
                <input type="text" id="filmSlug" value="our-hero-balthazar" placeholder="e.g., our-hero-balthazar">
            </div>
            <div class="form-group">
                <label for="market">Market</label>
                <select id="market">
                    <option value="all">All Markets (Denver + Chicago)</option>
                    <option value="denver">Denver (Sloan's Lake)</option>
                    <option value="chicago">Chicago (Wrigleyville)</option>
                </select>
            </div>
            <div class="form-group">
                <label for="daysAhead">Days Ahead</label>
                <input type="number" id="daysAhead" value="14" min="1" max="30">
            </div>
            <button id="searchBtn" onclick="searchShowtimes()">Search Showtimes</button>
            <button id="downloadBtn" class="download-btn" onclick="downloadCSV()" disabled>Download CSV</button>
        </div>

        <div id="results" class="results">
            <div class="status">Enter search criteria and click Search</div>
        </div>
    </div>

    <script>
        // Theater configurations
        const THEATERS = {
            'denver': {
                marketSlug: 'denver',
                cinemas: {
                    '0402': { name: 'Alamo Drafthouse Sloan\'s Lake', slug: 'sloans-lake', city: 'Denver' }
                }
            },
            'chicago': {
                marketSlug: 'chicago',
                cinemas: {
                    '1801': { name: 'Alamo Drafthouse Wrigleyville', slug: 'wrigleyville', city: 'Chicago' }
                }
            }
        };

        let lastSearchResults = [];

        async function searchShowtimes() {
            const filmSlug = document.getElementById('filmSlug').value.trim();
            const marketSelect = document.getElementById('market').value;
            const daysAhead = parseInt(document.getElementById('daysAhead').value) || 14;

            if (!filmSlug) {
                showError('Please enter a film slug');
                return;
            }

            const resultsDiv = document.getElementById('results');
            resultsDiv.innerHTML = '<div class="status">Searching...</div>';
            document.getElementById('searchBtn').disabled = true;
            document.getElementById('downloadBtn').disabled = true;

            lastSearchResults = [];

            try {
                const markets = marketSelect === 'all'
                    ? ['denver', 'chicago']
                    : [marketSelect];

                const cutoffDate = new Date();
                cutoffDate.setDate(cutoffDate.getDate() + daysAhead);

                for (const market of markets) {
                    const config = THEATERS[market];
                    const apiUrl = `https://drafthouse.com/s/mother/v2/schedule/market/${config.marketSlug}`;

                    try {
                        const response = await fetch(apiUrl, {
                            headers: {
                                'Accept': 'application/json'
                            }
                        });

                        if (!response.ok) {
                            throw new Error(`HTTP ${response.status}`);
                        }

                        const data = await response.json();
                        const sessions = data.data?.sessions || [];

                        for (const session of sessions) {
                            const presentationSlug = (session.presentationSlug || '').toLowerCase();
                            const legacySlug = (session.legacySlug || '').toLowerCase();

                            if (!presentationSlug.includes(filmSlug.toLowerCase()) && !legacySlug.includes(filmSlug.toLowerCase())) {
                                continue;
                            }

                            const cinemaId = session.cinemaId;
                            const cinemaConfig = config.cinemas[cinemaId];

                            // Skip if not one of our target cinemas
                            if (!cinemaConfig) continue;

                            const showTimeClt = session.showTimeClt;
                            if (!showTimeClt) continue;

                            // showTimeClt is in Central Time - parse it directly without timezone conversion
                            // Format: "2026-04-17T21:45:00"
                            const dateStr = showTimeClt.split('T')[0]; // "2026-04-17"
                            const timePart = showTimeClt.split('T')[1]; // "21:45:00"

                            // Parse hours/minutes for display
                            const [hours, minutes] = timePart.split(':').map(Number);
                            const hour12 = hours % 12 || 12;
                            const ampm = hours >= 12 ? 'PM' : 'AM';
                            const timeStr = `${hour12}:${minutes.toString().padStart(2, '0')} ${ampm}`;

                            // For date comparison, just compare the date strings
                            const cutoffDateStr = cutoffDate.toISOString().split('T')[0];
                            if (dateStr > cutoffDateStr) continue;

                            const sessionId = session.sessionId;
                            const ticketUrl = `https://drafthouse.com/${config.marketSlug}/show/${session.presentationSlug || filmSlug}?cinemaId=${cinemaId}`;

                            let eventType = 'General Admission';
                            if (presentationSlug.includes('baby')) {
                                eventType = 'Baby Day Show';
                            } else if (session.soldOut) {
                                eventType = 'General Admission (Sold Out)';
                            }

                            lastSearchResults.push({
                                theater: cinemaConfig.name,
                                date: dateStr,
                                time: timeStr,
                                eventType: eventType,
                                ticketLink: ticketUrl,
                                soldOut: session.soldOut || false,
                                seatsLeft: session.seatsLeft
                            });
                        }
                    } catch (e) {
                        console.error(`Error fetching ${market}:`, e);
                    }
                }
                // Sort by date and time
                lastSearchResults.sort((a, b) => {
                    const dateCompare = a.date.localeCompare(b.date);
                    if (dateCompare !== 0) return dateCompare;
                    return a.time.localeCompare(b.time);
                });

                displayResults();

            } catch (error) {
                showError(`Error: ${error.message}`);
            } finally {
                document.getElementById('searchBtn').disabled = false;
            }
        }

        function displayResults() {
            const resultsDiv = document.getElementById('results');

            if (lastSearchResults.length === 0) {
                resultsDiv.innerHTML = '<div class="status">No showtimes found</div>';
                document.getElementById('downloadBtn').disabled = true;
                return;
            }

            document.getElementById('downloadBtn').disabled = false;

            let html = '';
            for (const result of lastSearchResults) {
                const soldOutClass = result.soldOut ? 'sold-out' : '';
                const linkClass = result.soldOut ? 'sold-out' : '';

                let seatsHtml = '';
                if (result.seatsLeft !== undefined && result.seatsLeft !== null && !result.soldOut) {
                    let seatsClass = 'seats-left';
                    if (result.seatsLeft <= 10) seatsClass += ' critical';
                    else if (result.seatsLeft <= 30) seatsClass += ' low';
                    seatsHtml = `<span class="${seatsClass}">${result.seatsLeft} seats left</span>`;
                }

                html += `
                    <div class="result-card ${soldOutClass}">
                        <div class="theater-name">${result.theater}</div>
                        <div class="showtime-info">
                            <span class="date">${formatDate(result.date)}</span>
                            <span class="time">${result.time}</span>
                            ${seatsHtml}
                        </div>
                        <div class="event-type">${result.eventType}</div>
                        <a href="${result.ticketLink}" target="_blank" class="ticket-link ${linkClass}">
                            ${result.soldOut ? 'Sold Out' : 'Buy Tickets'}
                        </a>
                    </div>
                `;
            }

            resultsDiv.innerHTML = html;
        }

        function formatDate(dateStr) {
            const date = new Date(dateStr + 'T00:00:00');
            return date.toLocaleDateString('en-US', {
                weekday: 'short',
                month: 'short',
                day: 'numeric',
                year: 'numeric'
            });
        }

        function showError(message) {
            document.getElementById('results').innerHTML = `<div class="error">${message}</div>`;
        }

        function generateCSV() {
            const rows = ['Theater,Date,Time,Event Type,Ticket Link'];
            for (const result of lastSearchResults) {
                const theater = result.theater.replace(/,/g, '');
                const eventType = result.eventType.replace(/,/g, ';');
                rows.push(`${theater},${result.date},${result.time},${eventType},${result.ticketLink}`);
            }
            return rows.join('\n');
        }

        function downloadCSV() {
            if (lastSearchResults.length === 0) return;

            const csv = generateCSV();
            const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
            const url = URL.createObjectURL(blob);

            const filmSlug = document.getElementById('filmSlug').value.trim();
            const today = new Date().toISOString().split('T')[0];
            const filename = `alamo_showtimes_${filmSlug}_${today}.csv`;

            const link = document.createElement('a');
            link.href = url;
            link.download = filename;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
